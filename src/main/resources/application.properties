spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
spring.application.name=ykd-project

spring.config.import=optional:classpath:application-local.properties

# ==================== Weather / QWeather ====================
weather.qweather.api-host=${QWEATHER_API_HOST:p33tejmexe.re.qweatherapi.com}
weather.qweather.api-key=${QWEATHER_API_KEY:}
weather.qweather.connect-timeout-ms=5000
weather.qweather.read-timeout-ms=5000

# ==================== Spring AI / DeepSeek Chat Memory ====================
spring.ai.deepseek.api-key=${DEEPSEEK_API_KEY:}
spring.ai.deepseek.base-url=${DEEPSEEK_API_BASE_URL:https://api.deepseek.com}
spring.ai.deepseek.chat.options.model=${DEEPSEEK_MODEL:deepseek-chat}
spring.ai.model.chat=${SPRING_AI_MODEL_CHAT:deepseek}

# ==================== Spring AI Alibaba / DashScope ====================
spring.ai.dashscope.api-key=${DASHSCOPE_API_KEY:}
spring.ai.dashscope.base-url=${DASHSCOPE_API_BASE_URL:https://dashscope.aliyuncs.com}
spring.ai.model.image=dashscope-sdk
spring.ai.dashscope.sdk.api-key=${DASHSCOPE_API_KEY:}
spring.ai.dashscope.sdk.image.options.model=${SPRING_AI_DASHSCOPE_IMAGE_MODEL:qwen-image}
spring.ai.dashscope.sdk.image.options.size=1024*1024
spring.ai.dashscope.sdk.image.options.async=false
spring.ai.dashscope.chat.options.model=${SPRING_AI_DASHSCOPE_VISION_MODEL:qwen3-vl-plus}
spring.ai.model.audio.speech=dashscope
spring.ai.dashscope.audio.speech.options.model=${SPRING_AI_DASHSCOPE_TTS_MODEL:cosyvoice-v1}
spring.ai.dashscope.audio.speech.options.voice=${SPRING_AI_DASHSCOPE_TTS_VOICE:longhua}
spring.ai.dashscope.audio.speech.options.response-format=${SPRING_AI_DASHSCOPE_TTS_FORMAT:mp3}
spring.ai.dashscope.audio.speech.options.sample-rate=${SPRING_AI_DASHSCOPE_TTS_SAMPLE_RATE:48000}

# ==================== iLink ====================
ilink.enabled=${ILINK_ENABLED:true}
ilink.session-file=${ILINK_SESSION_FILE:.ilink/session.token}
ilink.connect-timeout-ms=${ILINK_CONNECT_TIMEOUT_MS:5000}
ilink.read-timeout-ms=${ILINK_READ_TIMEOUT_MS:35000}
ilink.write-timeout-ms=${ILINK_WRITE_TIMEOUT_MS:5000}
ilink.http-max-retries=${ILINK_HTTP_MAX_RETRIES:2}
ilink.retry-base-delay-ms=${ILINK_RETRY_BASE_DELAY_MS:300}
ilink.retry-max-delay-ms=${ILINK_RETRY_MAX_DELAY_MS:2000}
ilink.heartbeat-enabled=${ILINK_HEARTBEAT_ENABLED:false}
ilink.io-core-threads=${ILINK_IO_CORE_THREADS:2}
ilink.io-max-threads=${ILINK_IO_MAX_THREADS:4}
ilink.scheduler-threads=${ILINK_SCHEDULER_THREADS:1}
ilink.queue-capacity=${ILINK_QUEUE_CAPACITY:100}
ilink.auto-reconnect-enabled=${ILINK_AUTO_RECONNECT_ENABLED:true}
ilink.poll-delay-ms=${ILINK_POLL_DELAY_MS:500}
ilink.reply-core-threads=${ILINK_REPLY_CORE_THREADS:1}
ilink.reply-max-threads=${ILINK_REPLY_MAX_THREADS:1}
ilink.reply-queue-capacity=${ILINK_REPLY_QUEUE_CAPACITY:100}
ilink.image-context-ttl-minutes=${ILINK_IMAGE_CONTEXT_TTL_MINUTES:10}

# ==================== Yuque / 语雀 ====================
spring.ai.alibaba.toolcalling.yuque.token=${YUQUE_TOKEN:}
spring.ai.alibaba.toolcalling.yuque.base-url=${YUQUE_BASE_URL:https://www.yuque.com/api/v2}

# ==================== Logging ====================
logging.charset.console=UTF-8
logging.charset.file=UTF-8
logging.file.name=${LOGGING_FILE_NAME:logs/ykd-project.log}


logging.level.com.alibaba.cloud.ai.dashscope.audio=WARN

spring.ai.alibaba.toolcalling.alitranslate.access-key-id=${ALIBABA_CLOUD_ACCESS_KEY_ID:}
spring.ai.alibaba.toolcalling.alitranslate.secret-key=${ALIBABA_CLOUD_ACCESS_KEY_SECRET:}