spring.application.name=ykd-project

spring.config.import=optional:classpath:application-local.properties
weather.qweather.api-host=p33tejmexe.re.qweatherapi.com
weather.qweather.api-key=${QWEATHER_API_KEY:}
weather.qweather.connect-timeout-ms=5000
weather.qweather.read-timeout-ms=5000


deepseek.api-base-url=https://api.deepseek.com
deepseek.model=deepseek-chat
deepseek.api-key=${DEEPSEEK_API_KEY:}

# ==================== DashScope / Alibaba Cloud Model Studio ====================
dashscope.api-key=${DASHSCOPE_API_KEY:}
dashscope.api-base-url=${DASHSCOPE_API_BASE_URL:https://dashscope.aliyuncs.com}
dashscope.image-generation-model=qwen-image-2.0
dashscope.vision-model=qwen-vl-plus

# ==================== iLink ====================
ilink.enabled=${ILINK_ENABLED:true}

ilink.session-file=${ILINK_SESSION_FILE:.ilink/session.token}

ilink.connect-timeout-ms=5000

ilink.read-timeout-ms=35000

ilink.write-timeout-ms=5000

ilink.http-max-retries=2

ilink.retry-base-delay-ms=300
ilink.retry-max-delay-ms=2000

ilink.heartbeat-enabled=false

ilink.io-core-threads=2
ilink.io-max-threads=4

ilink.scheduler-threads=1

ilink.queue-capacity=100

ilink.auto-reconnect-enabled=true

ilink.poll-delay-ms=500

# DeepSeek reply worker pool
ilink.reply-core-threads=1
ilink.reply-max-threads=1
ilink.reply-queue-capacity=100


logging.charset.console=UTF-8
logging.charset.file=UTF-8
logging.file.name=logs/ykd-project.log
# 图片上下文仅保存在进程内存中，10 分钟未追问会自动清除
ilink.image-context-ttl-minutes=10
